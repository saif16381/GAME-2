<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Nexus: Cyber Dash - CrazyGames Edition</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --neon-purple: #9d00ff;
            --bg-dark: #050505;
            --text-light: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-light);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
            overflow: hidden;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.15));
        }

        /* UI Layers */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hidden {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* Menu Styles */
        h1 {
            font-size: clamp(2.8rem, 10vw, 5rem);
            margin-bottom: 0.2rem;
            text-transform: uppercase;
            letter-spacing: clamp(8px, 2vw, 16px);
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue), 0 0 40px rgba(0, 242, 255, 0.5);
            text-align: center;
            font-weight: 900;
            line-height: 1.1;
        }

        .subtitle {
            font-size: clamp(0.8rem, 2.5vw, 1.2rem);
            color: var(--neon-pink);
            margin-bottom: 3rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0.9;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }

        .btn {
            width: 100%;
            padding: 18px 40px;
            font-size: 1.4rem;
            background: rgba(255, 0, 234, 0.05);
            color: var(--text-light);
            border: 2px solid var(--neon-pink);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            font-weight: 800;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255, 0, 234, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: rgba(255, 0, 234, 0.15);
            border-width: 3px;
            padding: 22px 40px;
            font-size: 1.6rem;
        }

        .btn-secondary {
            background: rgba(0, 242, 255, 0.05);
            border-color: var(--neon-blue);
            font-size: 1.2rem;
        }

        .btn-accent {
            background: rgba(255, 215, 0, 0.05);
            border-color: #ffd700;
            color: #ffd700;
            font-size: 1.1rem;
        }

        .btn:hover, .btn:active {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 0 30px currentColor;
        }

        .btn-primary:hover, .btn-primary:active { background: var(--neon-pink); color: white; }
        .btn-secondary:hover, .btn-secondary:active { background: var(--neon-blue); color: #000; }
        .btn-accent:hover, .btn-accent:active { background: #ffd700; color: #000; }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: clamp(15px, 4vw, 25px);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 15;
        }

        .stats-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .score-display {
            font-size: 1.8rem;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            font-weight: 900;
            letter-spacing: 2px;
        }

        .high-score-display {
            font-size: 0.9rem;
            color: rgba(0, 242, 255, 0.6);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .multiplier-display {
            font-size: 1.2rem;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: right;
        }

        /* Shop Styles */
        #shop-screen {
            background: rgba(5, 5, 5, 0.98);
        }

        .shop-container {
            width: 95%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: clamp(15px, 3vw, 25px);
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(10px, 2vw, 20px);
            width: 100%;
        }

        @media (max-width: 480px) {
            .shop-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .shop-item {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: clamp(12px, 3vw, 20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .shop-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .shop-item.selected {
            border-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .shop-item.locked {
            opacity: 0.8;
        }

        .shop-item.selected::after {
            content: 'SELECTED';
            position: absolute;
            top: -10px;
            font-size: 0.6rem;
            background: var(--neon-blue);
            color: #000;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .skin-preview {
            width: clamp(30px, 8vw, 45px);
            height: clamp(30px, 8vw, 45px);
            border-radius: 8px;
            box-shadow: 0 0 15px currentColor;
        }

        .item-price {
            font-size: 0.9rem;
            color: #ffd700;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .item-name {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.9);
        }

        .instructions {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            line-height: 1.6;
            max-width: 80%;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 30px;
            border-radius: 50px;
            letter-spacing: 1px;
        }

        .instructions strong {
            color: var(--neon-blue);
            margin-right: 5px;
        }

        /* Mobile Controls Overlay */
        #mobile-controls {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom));
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 15;
            pointer-events: none;
        }

        .control-btn {
            width: 85px;
            height: 85px;
            background: rgba(0, 242, 255, 0.1);
            border: 2px solid rgba(0, 242, 255, 0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .control-btn:active {
            background: var(--neon-blue);
            transform: scale(0.92) translateY(4px);
            box-shadow: 0 0 30px var(--neon-blue);
            border-color: white;
        }

        .control-btn svg {
            width: 45px;
            height: 45px;
            fill: white;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
        }

        @media (max-width: 768px) {
            #mobile-controls { display: flex; }
            .instructions { display: none; }
            #hud { padding: 20px; }
            .score-display { font-size: 1.5rem; }
            .multiplier-display { font-size: 0.9rem; }
        }

        @media (min-width: 769px) {
            .control-btn { display: none; }
            .shop-item:hover { transform: translateY(-8px); }
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .btn-primary {
            animation: pulse 3s infinite ease-in-out;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud" class="hidden">
        <div class="stats-group">
            <div class="score-display" id="score-text">0</div>
            <div class="high-score-display" id="high-score-text">BEST: 0</div>
            <div class="score-display" id="currency-text" style="color: #ffd700; text-shadow: 0 0 10px #ffd700; font-size: 1.2rem;">BITS: 0</div>
        </div>
        <div class="multiplier-display" id="multiplier-text">LEVEL 1</div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="mobile-controls">
        <div class="control-btn" id="left-btn">
            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </div>
        <div class="control-btn" id="right-btn">
            <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </div>
    </div>

    <!-- Ads UI -->
    <div id="ad-container" class="ui-layer hidden" style="z-index: 100;">
        <div style="background: var(--bg-dark); padding: 40px; border: 2px solid var(--neon-blue); border-radius: 15px; text-align: center; box-shadow: 0 0 30px var(--neon-blue);">
            <h2 id="ad-title" style="color: var(--neon-blue); margin-bottom: 20px; letter-spacing: 5px;">COMMERCIAL BREAK</h2>
            <div id="ad-timer" style="font-size: 3rem; font-weight: 900; margin-bottom: 20px;">5</div>
            <p id="ad-status" style="color: rgba(255,255,255,0.6);">Loading secure transmission...</p>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="ui-layer">
        <h1>NEON NEXUS</h1>
        <div class="subtitle">Cyber Dash Protocol</div>
        
        <div class="menu-buttons">
            <button class="btn btn-primary" id="start-btn" data-testid="button-start">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                START DASH
            </button>
            <button class="btn btn-secondary" id="shop-btn" data-testid="button-shop">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                SKIN SHOP
            </button>
            <button class="btn btn-accent" id="rewarded-ad-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                GET 500 BITS (AD)
            </button>
        </div>

        <div class="instructions">
            <strong>PC:</strong> ARROW KEYS or WASD to navigate<br>
            <strong>MOBILE:</strong> USE ON-SCREEN BUTTONS
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="ui-layer hidden">
        <h1 style="color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink); margin-bottom: 0;">SYSTEM CRASH</h1>
        <div class="subtitle" style="margin-bottom: 2rem;">Connection Terminated</div>
        
        <div id="final-score" style="font-size: 3.5rem; margin-bottom: 0.5rem; color: var(--neon-blue); font-weight: 900; text-shadow: 0 0 20px var(--neon-blue);">0</div>
        <div id="new-best" style="color: #ffd700; margin-bottom: 2.5rem; font-weight: bold; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 10px #ffd700;" class="hidden">NEW RECORD DETECTED</div>
        
        <div class="menu-buttons">
            <div id="revive-container" style="width: 100%;">
                <button class="btn btn-accent" id="revive-btn" data-testid="button-revive">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                    REVIVE (WATCH AD)
                </button>
            </div>
            <button class="btn btn-primary" id="restart-btn" data-testid="button-restart">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
                REBOOT SYSTEM
            </button>
        </div>
    </div>

    <!-- Shop Screen -->
    <div id="shop-screen" class="ui-layer hidden">
        <h1>SKIN SHOP</h1>
        <div class="shop-container">
            <div class="shop-header">
                <div class="score-display" id="shop-currency-text" style="color: #ffd700;">BITS: 0</div>
            </div>
            <div class="shop-grid" id="shop-grid">
                <!-- Items injected by JS -->
            </div>
        </div>
        <button class="btn" id="back-to-menu-btn" style="font-size: 1.2rem; padding: 15px 40px;" data-testid="button-back">BACK</button>
    </div>
</div>

<script>
/**
 * NEON NEXUS: CYBER DASH
 */

// --- AUDIO ENGINE ---
const AudioEngine = (() => {
    let audioCtx = null;
    
    const init = () => {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    };
    
    const playTone = (freq, duration, type = 'square', volume = 0.1) => {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq / 2, audioCtx.currentTime + duration);
        
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    };

    return {
        init,
        playStart: () => playTone(440, 0.3, 'sine'),
        playScore: () => playTone(880, 0.05, 'sine', 0.02),
        playCrash: () => playTone(100, 0.6, 'sawtooth', 0.2),
        playLevelUp: () => {
            playTone(523.25, 0.1);
            setTimeout(() => playTone(659.25, 0.1), 100);
            setTimeout(() => playTone(783.99, 0.2), 200);
        }
    };
})();

// --- ADS SYSTEM ---
const AdsSystem = (() => {
    const adContainer = document.getElementById('ad-container');
    const adTimer = document.getElementById('ad-timer');
    const adStatus = document.getElementById('ad-status');
    const adTitle = document.getElementById('ad-title');
    
    let isAdPlaying = false;

    const showAd = (type, callback) => {
        if (isAdPlaying) return;
        isAdPlaying = true;
        
        adContainer.classList.remove('hidden');
        adTitle.innerText = type === 'rewarded' ? 'REWARDED DATA STREAM' : 'COMMERCIAL BREAK';
        adStatus.innerText = 'Initializing...';
        
        let timeLeft = 5;
        adTimer.innerText = timeLeft;

        const interval = setInterval(() => {
            timeLeft--;
            adTimer.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(interval);
                adContainer.classList.add('hidden');
                isAdPlaying = false;
                if (callback) callback();
            }
        }, 1000);
    };

    return {
        showInterstitial: (callback) => showAd('interstitial', callback),
        showRewarded: (callback) => showAd('rewarded', callback),
        isAdPlaying: () => isAdPlaying
    };
})();

// --- GAME LOGIC ---
const Game = (() => {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const hud = document.getElementById('hud');
    const scoreText = document.getElementById('score-text');
    const highScoreText = document.getElementById('high-score-text');
    const multiplierText = document.getElementById('multiplier-text');
    const currencyText = document.getElementById('currency-text');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const shopScreen = document.getElementById('shop-screen');
    const shopGrid = document.getElementById('shop-grid');
    const shopCurrencyText = document.getElementById('shop-currency-text');
    const finalScoreDisplay = document.getElementById('final-score');
    const newBestLabel = document.getElementById('new-best');
    const reviveBtn = document.getElementById('revive-btn');
    const reviveContainer = document.getElementById('revive-container');

    const skins = [
        { id: 'default', name: 'Cyan', color: '#00f2ff', price: 0 },
        { id: 'pink', name: 'Pink', color: '#ff00ea', price: 500 },
        { id: 'purple', name: 'Purple', color: '#9d00ff', price: 1000 },
        { id: 'green', name: 'Acid', color: '#00ff66', price: 2000 },
        { id: 'gold', name: 'Gold', color: '#ffd700', price: 5000 },
        { id: 'rainbow', name: 'Neo', color: '#ffffff', price: 10000 }
    ];

    let unlockedSkins = JSON.parse(localStorage.getItem('neon_nexus_unlocked') || '["default"]');
    let currentSkinId = localStorage.getItem('neon_nexus_skin') || 'default';

    let state = 'MENU';
    let score = 0;
    let currency = parseInt(localStorage.getItem('neon_nexus_currency') || '0');
    let highScore = parseInt(localStorage.getItem('neon_nexus_high_score') || '0');
    let level = 1;
    let speed = 7;
    let frame = 0;
    let obstacles = [];
    let particles = [];
    let shake = 0;
    let canRevive = true;
    
    const player = {
        x: 0,
        y: 0,
        width: 40,
        height: 40,
        targetX: 0,
        color: '#00f2ff',
        trail: []
    };

    const updatePlayerColor = () => {
        const skin = skins.find(s => s.id === currentSkinId);
        if (skin) player.color = skin.color;
    };
    updatePlayerColor();

    const resize = () => {
        const container = canvas.parentElement;
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        player.x = canvas.width / 2;
        player.y = canvas.height * 0.8;
        player.targetX = player.x;
        
        if (canvas.width < 500) {
            player.width = 34;
            player.height = 34;
        } else {
            player.width = 44;
            player.height = 44;
        }
        highScoreText.innerText = `BEST: ${Math.floor(highScore)}`;
        currencyText.innerText = `BITS: ${currency}`;
    };

    window.addEventListener('resize', resize);
    resize();

    // Controls
    const keys = {};
    const setKey = (k, v) => {
        keys[k] = v;
        keys[k.toLowerCase()] = v;
        if (k === 'ArrowLeft' || k === 'a') keys['left'] = v;
        if (k === 'ArrowRight' || k === 'd') keys['right'] = v;
    };

    window.addEventListener('keydown', e => setKey(e.key, true));
    window.addEventListener('keyup', e => setKey(e.key, false));
    
    // Mobile buttons
    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');

    const bindMobileBtn = (btn, key) => {
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; }, {passive: false});
        btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; }, {passive: false});
        btn.addEventListener('mousedown', () => keys[key] = true);
        btn.addEventListener('mouseup', () => keys[key] = false);
        btn.addEventListener('mouseleave', () => keys[key] = false);
    };

    bindMobileBtn(leftBtn, 'left');
    bindMobileBtn(rightBtn, 'right');

    const createObstacle = () => {
        const minWidth = canvas.width < 500 ? 50 : 80;
        const maxWidth = canvas.width < 500 ? canvas.width * 0.4 : canvas.width * 0.25;
        const width = Math.random() * (maxWidth - minWidth) + minWidth;
        obstacles.push({
            x: Math.random() * (canvas.width - width),
            y: -60,
            width: width,
            height: 25,
            color: Math.random() > 0.5 ? '#ff00ea' : '#9d00ff',
            passed: false
        });
    };

    const createExplosion = (x, y, color, count = 25) => {
        for (let i = 0; i < count; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 20,
                vy: (Math.random() - 0.5) * 20,
                life: 1.0,
                decay: Math.random() * 0.03 + 0.015,
                color,
                size: Math.random() * 5 + 2
            });
        }
    };

    const reset = () => {
        AudioEngine.init();
        updatePlayerColor();
        score = 0;
        level = 1;
        speed = 8;
        frame = 0;
        obstacles = [];
        particles = [];
        shake = 0;
        player.trail = [];
        player.x = canvas.width / 2;
        player.targetX = player.x;
        state = 'PLAYING';
        canRevive = true;
        AudioEngine.playStart();
        
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        newBestLabel.classList.add('hidden');
        hud.classList.remove('hidden');
        multiplierText.innerText = `LEVEL ${level}`;
        highScoreText.innerText = `BEST: ${Math.floor(highScore)}`;
    };

    const revive = () => {
        state = 'PLAYING';
        obstacles = []; // Clear current obstacles to give player a chance
        player.x = canvas.width / 2;
        player.targetX = player.x;
        canRevive = false; // Only one revive per run
        gameOverScreen.classList.add('hidden');
        hud.classList.remove('hidden');
        AudioEngine.playStart();
    };

    reviveBtn.addEventListener('click', () => {
        AdsSystem.showRewarded(() => {
            revive();
        });
    });

    const update = () => {
        if (state === 'SHOP') return;
        if (state !== 'PLAYING') return;

        frame++;
        if (shake > 0) shake *= 0.9;
        
        // Player Movement
        const moveAcc = canvas.width < 500 ? 4.5 : 6.0;
        const friction = 0.85;
        
        let dx = 0;
        if (keys['left']) dx -= moveAcc;
        if (keys['right']) dx += moveAcc;
        
        player.targetX += dx;
        player.targetX = Math.max(player.width/2, Math.min(canvas.width - player.width/2, player.targetX));
        
        // Smooth lerping with momentum
        player.x += (player.targetX - player.x) * 0.35;

        // Trail effect
        if (frame % 2 === 0) {
            player.trail.unshift({ x: player.x, y: player.y, life: 1.0 });
            if (player.trail.length > 10) player.trail.pop();
        }
        player.trail.forEach(t => t.life -= 0.1);

        // Difficulty Progression
        if (frame % 400 === 0) {
            level++;
            speed += 1.5;
            AudioEngine.playLevelUp();
            multiplierText.innerText = `LEVEL ${level}`;
            shake = 10;
        }

        // Obstacles
        const spawnRate = Math.max(8, 35 - (level * 3));
        if (frame % spawnRate === 0) {
            createObstacle();
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            const o = obstacles[i];
            o.y += speed;

            // Collision detection with tight hitbox
            const pX = player.x - player.width/2 + 8;
            const pW = player.width - 16;
            const pY = player.y - player.height/2 + 8;
            const pH = player.height - 16;

            if (
                pX < o.x + o.width &&
                pX + pW > o.x &&
                pY < o.y + o.height &&
                pY + pH > o.y
            ) {
                state = 'GAMEOVER';
                shake = 30;
                AudioEngine.playCrash();
                createExplosion(player.x, player.y, player.color, 40);
                createExplosion(player.x, player.y, o.color, 40);
                
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('neon_nexus_high_score', Math.floor(highScore).toString());
                    newBestLabel.classList.remove('hidden');
                }
                
                const showGameOver = () => {
                    gameOverScreen.classList.remove('hidden');
                    finalScoreDisplay.innerText = Math.floor(score);
                    if (canRevive) {
                        reviveContainer.classList.remove('hidden');
                    } else {
                        reviveContainer.classList.add('hidden');
                    }
                };

                const adChance = Math.random();
                if (adChance < 0.3) { // 30% chance for interstitial on game over
                    AdsSystem.showInterstitial(showGameOver);
                } else {
                    showGameOver();
                }
                return;
            }

            if (!o.passed && o.y > player.y) {
                o.passed = true;
                score += 100 * level;
                currency += 5 * level;
                localStorage.setItem('neon_nexus_currency', currency.toString());
                currencyText.innerText = `BITS: ${currency}`;
                AudioEngine.playScore();
            }

            if (o.y > canvas.height + 100) {
                obstacles.splice(i, 1);
            }
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= p.decay;
            if (p.life <= 0) particles.splice(i, 1);
        }

        score += (speed / 10) * level; 
        scoreText.innerText = Math.floor(score);
    };

    const draw = () => {
        ctx.save();
        if (shake > 0) {
            ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
        }

        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Dynamic Grid
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.1)';
        ctx.lineWidth = 1;
        const spacing = 70;
        const offset = (frame * speed * 0.4) % spacing;
        
        ctx.beginPath();
        for (let x = 0; x <= canvas.width; x += spacing) {
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
        }
        for (let y = offset; y <= canvas.height; y += spacing) {
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
        }
        ctx.stroke();

        // Trail
        player.trail.forEach(t => {
            const radius = (player.width / 2) * t.life;
            if (radius <= 0) return;
            ctx.globalAlpha = t.life * 0.4;
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(t.x, t.y, radius, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        // Draw Particles
        particles.forEach(p => {
            const radius = p.size * p.life;
            if (radius <= 0) return;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.beginPath();
            ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        // Draw Obstacles
        obstacles.forEach(o => {
            ctx.shadowBlur = 20;
            ctx.shadowColor = o.color;
            ctx.fillStyle = o.color;
            ctx.fillRect(o.x, o.y, o.width, o.height);
            
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 0.2;
            ctx.fillRect(o.x + 2, o.y + 2, o.width - 4, o.height - 4);
            ctx.globalAlpha = 1.0;
        });

        // Draw Player
        if (state === 'PLAYING' || state === 'MENU') {
            const drawX = state === 'MENU' ? canvas.width / 2 : player.x;
            const drawY = state === 'MENU' ? canvas.height * 0.8 : player.y;

            ctx.shadowBlur = 30;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            
            // Neon Ship
            ctx.beginPath();
            ctx.moveTo(drawX, drawY - player.height/2);
            ctx.lineTo(drawX - player.width/2, drawY + player.height/2);
            ctx.lineTo(drawX, drawY + player.height/4);
            ctx.lineTo(drawX + player.width/2, drawY + player.height/2);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(drawX, drawY - player.height/3);
            ctx.lineTo(drawX - 4, drawY + 2);
            ctx.lineTo(drawX + 4, drawY + 2);
            ctx.closePath();
            ctx.fill();
            
            // Engine
            const engineH = Math.sin(frame * 0.4) * 8 + 12;
            ctx.fillStyle = 'rgba(255, 0, 234, 0.8)';
            ctx.shadowColor = 'rgba(255, 0, 234, 1)';
            ctx.fillRect(drawX - 8, drawY + player.height/2 - 2, 16, engineH);
        }

        ctx.restore();
        ctx.shadowBlur = 0;
        
        requestAnimationFrame(() => {
            update();
            draw();
        });
    };

    const openShop = () => {
        state = 'SHOP';
        startScreen.classList.add('hidden');
        shopScreen.classList.remove('hidden');
        renderShop();
    };

    const closeShop = () => {
        state = 'MENU';
        shopScreen.classList.add('hidden');
        startScreen.classList.remove('hidden');
    };

    const renderShop = () => {
        shopCurrencyText.innerText = `BITS: ${currency}`;
        shopGrid.innerHTML = '';
        
        skins.forEach(skin => {
            const isUnlocked = unlockedSkins.includes(skin.id);
            const isSelected = currentSkinId === skin.id;
            
            const item = document.createElement('div');
            item.className = `shop-item ${isSelected ? 'selected' : ''} ${!isUnlocked ? 'locked' : ''}`;
            item.innerHTML = `
                <div class="skin-preview" style="background: ${skin.color}; box-shadow: 0 0 10px ${skin.color}"></div>
                <div class="item-name">${skin.name}</div>
                <div class="item-price">${isUnlocked ? (isSelected ? 'EQUIPPED' : 'OWNED') : skin.price + ' BITS'}</div>
            `;
            
            item.onclick = () => {
                if (isUnlocked) {
                    currentSkinId = skin.id;
                    localStorage.setItem('neon_nexus_skin', skin.id);
                    renderShop();
                } else if (currency >= skin.price) {
                    currency -= skin.price;
                    unlockedSkins.push(skin.id);
                    localStorage.setItem('neon_nexus_currency', currency.toString());
                    localStorage.setItem('neon_nexus_unlocked', JSON.stringify(unlockedSkins));
                    currentSkinId = skin.id;
                    localStorage.setItem('neon_nexus_skin', skin.id);
                    currencyText.innerText = `BITS: ${currency}`;
                    AudioEngine.playLevelUp();
                    renderShop();
                } else {
                    AudioEngine.playCrash();
                }
            };
            
            shopGrid.appendChild(item);
        });
    };

    const initAds = () => {
        const rewardBtn = document.getElementById('rewarded-ad-btn');
        rewardBtn.onclick = () => {
            AdsSystem.showRewarded(() => {
                currency += 500;
                localStorage.setItem('neon_nexus_currency', currency.toString());
                currencyText.innerText = `BITS: ${currency}`;
                if (state === 'SHOP') {
                    renderShop();
                }
                AudioEngine.playLevelUp();
            });
        };
    };

    return { init: () => {
        draw();
        initAds();
        document.getElementById('start-btn').onclick = reset;
        document.getElementById('restart-btn').onclick = reset;
        document.getElementById('shop-btn').onclick = openShop;
        document.getElementById('back-to-menu-btn').onclick = closeShop;
    }};
})();

Game.init();

</script>
</body>
