<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Nexus: Cyber Dash - CrazyGames Edition</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --neon-purple: #9d00ff;
            --bg-dark: #050505;
            --text-light: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-light);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        /* UI Layers */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            transition: opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        /* Menu Styles */
        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            text-align: center;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--neon-pink);
            margin-bottom: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn {
            padding: 18px 50px;
            font-size: 1.6rem;
            background: transparent;
            color: var(--text-light);
            border: 3px solid var(--neon-pink);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            margin: 15px;
            font-weight: bold;
            border-radius: 4px;
        }

        .btn:hover, .btn:active {
            background: var(--neon-pink);
            box-shadow: 0 0 30px var(--neon-pink);
            transform: scale(1.05);
        }

        .score-display {
            position: absolute;
            top: 25px;
            left: 25px;
            font-size: 1.8rem;
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
            z-index: 5;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .multiplier-display {
            position: absolute;
            top: 65px;
            left: 25px;
            font-size: 1.1rem;
            color: var(--neon-pink);
            z-index: 5;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .instructions {
            margin-top: 3rem;
            font-size: 1rem;
            color: #aaa;
            text-align: center;
            line-height: 1.6;
        }

        /* Mobile Controls Overlay */
        #mobile-hint {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: none;
            justify-content: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .subtitle { font-size: 0.9rem; }
            #mobile-hint { display: flex; }
            .score-display { font-size: 1.4rem; top: 15px; left: 15px; }
            .multiplier-display { font-size: 0.9rem; top: 45px; left: 15px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud" class="hidden">
        <div class="score-display" id="score-text">SCORE: 0</div>
        <div class="multiplier-display" id="multiplier-text">LEVEL 1</div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="mobile-hint">Tap sides to move</div>

    <!-- Start Screen -->
    <div id="start-screen" class="ui-layer">
        <h1>NEON NEXUS</h1>
        <div class="subtitle">Cyber Dash Protocol</div>
        <button class="btn" id="start-btn" data-testid="button-start">START DASH</button>
        <div class="instructions">
            <strong>PC:</strong> ARROW KEYS or WASD to move<br>
            <strong>MOBILE:</strong> TAP LEFT/RIGHT SIDES
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="ui-layer hidden">
        <h1 style="color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink);">CRASHED!</h1>
        <div id="final-score" style="font-size: 2.5rem; margin-bottom: 2rem; color: var(--neon-blue);">SCORE: 0</div>
        <button class="btn" id="restart-btn" data-testid="button-restart">REBOOT</button>
    </div>
</div>

<script>
/**
 * NEON NEXUS: CYBER DASH
 * A high-performance, responsive canvas game.
 * Complies with CrazyGames requirements: Single file, no external assets, mobile-ready.
 */

// --- UTILITIES & AUDIO ---
const AudioEngine = (() => {
    let audioCtx = null;
    
    const init = () => {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    };
    
    const playTone = (freq, duration, type = 'square', volume = 0.1) => {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq / 2, audioCtx.currentTime + duration);
        
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    };

    return {
        init,
        playStart: () => playTone(440, 0.3, 'sine'),
        playScore: () => playTone(880, 0.05, 'sine', 0.03),
        playCrash: () => playTone(100, 0.6, 'sawtooth', 0.2),
        playLevelUp: () => {
            playTone(523.25, 0.1);
            setTimeout(() => playTone(659.25, 0.1), 100);
            setTimeout(() => playTone(783.99, 0.2), 200);
        }
    };
})();

// --- GAME LOGIC ---
const Game = (() => {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const hud = document.getElementById('hud');
    const scoreText = document.getElementById('score-text');
    const multiplierText = document.getElementById('multiplier-text');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreDisplay = document.getElementById('final-score');

    let state = 'MENU';
    let score = 0;
    let level = 1;
    let speed = 6;
    let frame = 0;
    let obstacles = [];
    let particles = [];
    
    const player = {
        x: 0,
        y: 0,
        width: 40,
        height: 40,
        targetX: 0,
        color: '#00f2ff'
    };

    const resize = () => {
        const container = canvas.parentElement;
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        player.x = canvas.width / 2;
        player.y = canvas.height * 0.8;
        player.targetX = player.x;
        
        // Adjust player size for mobile
        if (canvas.width < 500) {
            player.width = 30;
            player.height = 30;
        } else {
            player.width = 40;
            player.height = 40;
        }
    };

    window.addEventListener('resize', resize);
    resize();

    // Controls
    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.key] = true;
        keys[e.key.toLowerCase()] = true;
    });
    window.addEventListener('keyup', e => {
        keys[e.key] = false;
        keys[e.key.toLowerCase()] = false;
    });
    
    // Mobile touch
    const handleTouch = (e) => {
        if (state !== 'PLAYING') return;
        const touchX = e.touches[0].clientX;
        if (touchX < window.innerWidth / 2) {
            keys['left'] = true;
            keys['right'] = false;
        } else {
            keys['right'] = true;
            keys['left'] = false;
        }
    };

    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        handleTouch(e);
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        handleTouch(e);
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
        keys['left'] = false;
        keys['right'] = false;
    });

    const createObstacle = () => {
        const width = Math.random() * (canvas.width * 0.3) + 60;
        obstacles.push({
            x: Math.random() * (canvas.width - width),
            y: -50,
            width: width,
            height: 25,
            color: Math.random() > 0.5 ? '#ff00ea' : '#9d00ff'
        });
    };

    const createExplosion = (x, y, color) => {
        for (let i = 0; i < 20; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 15,
                vy: (Math.random() - 0.5) * 15,
                life: 1.0,
                decay: Math.random() * 0.02 + 0.01,
                color,
                size: Math.random() * 4 + 2
            });
        }
    };

    const reset = () => {
        AudioEngine.init();
        score = 0;
        level = 1;
        speed = 7;
        frame = 0;
        obstacles = [];
        particles = [];
        player.x = canvas.width / 2;
        player.targetX = player.x;
        state = 'PLAYING';
        AudioEngine.playStart();
        
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        hud.classList.remove('hidden');
        multiplierText.innerText = `LEVEL ${level}`;
    };

    const update = () => {
        if (state !== 'PLAYING') return;

        frame++;
        
        // Player Movement
        const moveSpeed = canvas.width < 500 ? 12 : 15;
        if (keys['ArrowLeft'] || keys['a'] || keys['left']) player.targetX -= moveSpeed;
        if (keys['ArrowRight'] || keys['d'] || keys['right']) player.targetX += moveSpeed;
        
        // Bounds
        player.targetX = Math.max(player.width/2, Math.min(canvas.width - player.width/2, player.targetX));
        player.x += (player.targetX - player.x) * 0.25;

        // Difficulty Progression
        if (frame % 600 === 0) {
            level++;
            speed += 0.8;
            AudioEngine.playLevelUp();
            multiplierText.innerText = `LEVEL ${level}`;
        }

        // Obstacles
        const spawnRate = Math.max(15, 50 - (level * 2));
        if (frame % spawnRate === 0) {
            createObstacle();
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            const o = obstacles[i];
            o.y += speed;

            // Collision detection with padding for fairness
            const pX = player.x - player.width/2 + 5;
            const pW = player.width - 10;
            const pY = player.y - player.height/2 + 5;
            const pH = player.height - 10;

            if (
                pX < o.x + o.width &&
                pX + pW > o.x &&
                pY < o.y + o.height &&
                pY + pH > o.y
            ) {
                state = 'GAMEOVER';
                AudioEngine.playCrash();
                createExplosion(player.x, player.y, player.color);
                createExplosion(player.x, player.y, o.color);
                gameOverScreen.classList.remove('hidden');
                finalScoreDisplay.innerText = `SCORE: ${Math.floor(score)}`;
                return;
            }

            if (o.y > canvas.height) {
                obstacles.splice(i, 1);
                score += 50;
                AudioEngine.playScore();
            }
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= p.decay;
            if (p.life <= 0) particles.splice(i, 1);
        }

        score += 0.5 * level; // Time-based score
        scoreText.innerText = `SCORE: ${Math.floor(score)}`;
    };

    const draw = () => {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Background Dynamic Grid
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.08)';
        ctx.lineWidth = 1;
        const spacing = 60;
        const offset = (frame * speed * 0.5) % spacing;
        
        for (let x = 0; x < canvas.width; x += spacing) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
        }
        for (let y = offset; y < canvas.height; y += spacing) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }

        // Draw Particles
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        // Draw Obstacles
        obstacles.forEach(o => {
            ctx.shadowBlur = 20;
            ctx.shadowColor = o.color;
            ctx.fillStyle = o.color;
            ctx.fillRect(o.x, o.y, o.width, o.height);
            
            // Add a "core" glow
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 0.3;
            ctx.fillRect(o.x + 5, o.y + 5, o.width - 10, o.height - 10);
            ctx.globalAlpha = 1.0;
        });

        // Draw Player
        if (state === 'PLAYING' || state === 'MENU') {
            const drawX = state === 'MENU' ? canvas.width / 2 : player.x;
            const drawY = state === 'MENU' ? canvas.height * 0.8 : player.y;

            ctx.shadowBlur = 25;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            
            // Cyber Ship Shape
            ctx.beginPath();
            ctx.moveTo(drawX, drawY - player.height/2);
            ctx.lineTo(drawX - player.width/2, drawY + player.height/2);
            ctx.lineTo(drawX, drawY + player.height/3);
            ctx.lineTo(drawX + player.width/2, drawY + player.height/2);
            ctx.closePath();
            ctx.fill();
            
            // Internal Detail
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(drawX, drawY - player.height/4);
            ctx.lineTo(drawX - 5, drawY + 5);
            ctx.lineTo(drawX + 5, drawY + 5);
            ctx.closePath();
            ctx.fill();
            
            // Engine Glow
            const enginePulse = Math.sin(frame * 0.2) * 10 + 20;
            ctx.shadowBlur = enginePulse;
            ctx.fillStyle = 'rgba(255, 0, 234, 0.8)';
            ctx.fillRect(drawX - 10, drawY + player.height/2, 20, 10);
        }

        ctx.shadowBlur = 0;
        requestAnimationFrame(() => {
            update();
            draw();
        });
    };

    return { init: () => {
        draw();
        document.getElementById('start-btn').onclick = reset;
        document.getElementById('restart-btn').onclick = reset;
    }};
})();

// Boot game
Game.init();

</script>
</body>
</html>
