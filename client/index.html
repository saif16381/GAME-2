<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Jump - CrazyGames Edition</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --bg-dark: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .screen {
            pointer-events: auto;
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 15px;
            border: 2px solid var(--neon-blue);
            text-align: center;
            display: none;
            max-width: 90%;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .active { display: block; }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            letter-spacing: 4px;
        }

        .btn {
            background: transparent;
            color: white;
            border: 2px solid var(--neon-pink);
            padding: 0.8rem 2rem;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.2s;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 5px;
        }

        .btn:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink);
        }

        .stats {
            position: absolute;
            top: 1rem;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 1.2rem;
            pointer-events: none;
            text-shadow: 0 0 5px black;
        }

        .instruction {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #aaa;
        }

        #mobile-controls {
            position: absolute;
            bottom: 2rem;
            width: 100%;
            display: none;
            justify-content: center;
            gap: 2rem;
            pointer-events: auto;
        }

        .touch-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer">
        <div class="stats" id="game-stats" style="display: none;">
            <div>SCORE: <span id="score-val">0</span></div>
            <div>HIGH: <span id="high-val">0</span></div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <h1>NEON JUMP</h1>
            <p>Leap between energy platforms.</p>
            <p>Don't fall into the void!</p>
            <button class="btn" onclick="game.start()">Start Game</button>
            <div class="instruction">Desktop: SPACE or CLICK | Mobile: TAP</div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameover-screen" class="screen">
            <h1 style="color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink);">GAME OVER</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <button class="btn" onclick="game.start()">Try Again</button>
        </div>
    </div>
</div>

<script>
/**
 * AUDIO UTILITY (Web Audio API)
 */
const AudioEngine = (() => {
    let ctx = null;
    const init = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); };
    
    const playTone = (freq, type, duration, vol) => {
        if (!ctx) return;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + duration);
    };

    return {
        init,
        jump: () => playTone(400, 'square', 0.1, 0.1),
        fail: () => playTone(150, 'sawtooth', 0.4, 0.2),
        score: () => playTone(800, 'sine', 0.1, 0.1)
    };
})();

/**
 * GAME ENGINE
 */
const game = (() => {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Config
    const WIDTH = 400;
    const HEIGHT = 600;
    const GRAVITY = 0.4;
    const JUMP_FORCE = -10;
    const PLATFORM_WIDTH = 80;
    const PLATFORM_HEIGHT = 15;
    
    let state = 'START'; // START, PLAYING, GAMEOVER
    let score = 0;
    let highScore = localStorage.getItem('neonJumpHigh') || 0;
    
    let player = {
        x: WIDTH / 2,
        y: HEIGHT - 100,
        vx: 0,
        vy: 0,
        size: 20,
        color: '#00f2ff'
    };
    
    let platforms = [];
    let cameraY = 0;
    let particles = [];

    const init = () => {
        resize();
        window.addEventListener('resize', resize);
        
        const handleInput = (e) => {
            if (state === 'PLAYING') {
                if (player.vy > 0) return; // Only allow jumping while going up or at peak? 
                // Actually simplified: jump whenever if we hit a platform. 
                // In this mechanic, it's auto-jump on landing.
            }
        };

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleInput(); });
        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); });
    };

    const resize = () => {
        const scale = Math.min(window.innerWidth / WIDTH, window.innerHeight / HEIGHT);
        canvas.width = WIDTH;
        canvas.height = HEIGHT;
        canvas.style.width = (WIDTH * scale) + 'px';
        canvas.style.height = (HEIGHT * scale) + 'px';
    };

    const spawnPlatform = (y) => {
        platforms.push({
            x: Math.random() * (WIDTH - PLATFORM_WIDTH),
            y: y,
            w: PLATFORM_WIDTH,
            h: PLATFORM_HEIGHT,
            color: score > 500 ? '#ff00ea' : '#00f2ff'
        });
    };

    const reset = () => {
        score = 0;
        cameraY = 0;
        player.x = WIDTH / 2;
        player.y = HEIGHT - 100;
        player.vx = 0;
        player.vy = JUMP_FORCE;
        platforms = [];
        particles = [];
        
        // Initial platforms
        for (let i = 0; i < 7; i++) {
            spawnPlatform(HEIGHT - i * 100);
        }
        // Starting platform directly under player
        platforms[0].x = player.x - PLATFORM_WIDTH/2;
    };

    const start = () => {
        AudioEngine.init();
        state = 'PLAYING';
        reset();
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('gameover-screen').classList.remove('active');
        document.getElementById('game-stats').style.display = 'flex';
        document.getElementById('high-val').innerText = highScore;
    };

    const gameOver = () => {
        state = 'GAMEOVER';
        AudioEngine.fail();
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('neonJumpHigh', highScore);
        }
        document.getElementById('final-score').innerText = score;
        document.getElementById('gameover-screen').classList.add('active');
    };

    const update = () => {
        if (state !== 'PLAYING') return;

        // Player physics
        player.vy += GRAVITY;
        player.y += player.vy;
        
        // Tilt based on mouse/touch position relative to center
        // Simplified auto-movement: follow pointer horizontal
        // But for "Unique" let's do a simple wrap-around world
        
        // Camera follow
        if (player.y < HEIGHT / 2) {
            let diff = HEIGHT / 2 - player.y;
            player.y = HEIGHT / 2;
            cameraY += diff;
            score += Math.floor(diff);
            document.getElementById('score-val').innerText = score;
            
            platforms.forEach(p => p.y += diff);
        }

        // Platforms
        platforms.forEach((p, i) => {
            // Collision
            if (player.vy > 0 && 
                player.x + player.size/2 > p.x && 
                player.x - player.size/2 < p.x + p.w &&
                player.y + player.size/2 > p.y && 
                player.y + player.size/2 < p.y + p.h + player.vy) {
                
                player.vy = JUMP_FORCE;
                AudioEngine.jump();
                createParticles(player.x, player.y + player.size/2, p.color);
            }
            
            // Remove old platforms
            if (p.y > HEIGHT) {
                platforms.splice(i, 1);
                spawnPlatform(platforms[platforms.length-1].y - 100 - Math.random() * 20);
            }
        });

        // Horizontal movement (Simple Mouse/Touch follow)
        // We'll use a hidden touch/mouse tracker
        const targetX = inputX || WIDTH/2;
        player.x += (targetX - player.x) * 0.15;

        // Bounds
        if (player.y > HEIGHT + 100) {
            gameOver();
        }

        // Particles
        particles.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            if (p.life <= 0) particles.splice(i, 1);
        });
    };

    let inputX = WIDTH / 2;
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        inputX = (e.clientX - rect.left) * (WIDTH / rect.width);
    });
    canvas.addEventListener('touchmove', (e) => {
        const rect = canvas.getBoundingClientRect();
        inputX = (e.touches[0].clientX - rect.left) * (WIDTH / rect.width);
    });

    const createParticles = (x, y, color) => {
        for(let i=0; i<8; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 5,
                vy: (Math.random() - 0.5) * 5,
                life: 1,
                color: color
            });
        }
    };

    const draw = () => {
        ctx.fillStyle = '#0a0a0c';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        // Draw grid/background effect
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
        ctx.lineWidth = 1;
        for(let i=0; i<WIDTH; i+=40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, HEIGHT); ctx.stroke();
        }
        for(let i=0; i<HEIGHT; i+=40) {
            let offset = cameraY % 40;
            ctx.beginPath(); ctx.moveTo(0, i + offset); ctx.lineTo(WIDTH, i + offset); ctx.stroke();
        }

        // Draw platforms
        platforms.forEach(p => {
            ctx.shadowBlur = 10;
            ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.shadowBlur = 0;
        });

        // Draw player
        ctx.shadowBlur = 15;
        ctx.shadowColor = player.color;
        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.size/2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Draw particles
        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 3, 3);
        });
        ctx.globalAlpha = 1;
    };

    const loop = () => {
        update();
        draw();
        requestAnimationFrame(loop);
    };

    return { init, start, loop };
})();

// Initialize
game.init();
game.loop();
</script>
</body>
</html>
